name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate required secrets
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "CLOUDFLARE_ACCOUNT_ID is not available. Add it as a repository secret or production environment secret."; exit 1; }
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "CLOUDFLARE_API_TOKEN is not available. Add it as a repository secret or production environment secret."; exit 1; }
          test -n "$DATABASE_URL" || { echo "DATABASE_URL is not available. Add it as a repository secret or production environment secret."; exit 1; }

      - name: Configure DATABASE_URL secret in Cloudflare
        run: printf '%s' "$DATABASE_URL" | npx wrangler secret put DATABASE_URL

      - name: Deploy to Cloudflare
        run: |
          set -o pipefail
          npm run deploy 2>&1 | tee deploy.log
          deployment_url=$(grep -Eo 'https://[^[:space:]]+' deploy.log | grep -E '(workers\.dev|pages\.dev)' | tail -n 1 | sed 's/[),.]*$//')
          test -n "$deployment_url"
          echo "DEPLOYMENT_URL=$deployment_url" >> "$GITHUB_ENV"

      - name: Verify deployed routes
        run: |
          curl --fail --silent --show-error --location --retry 5 --retry-all-errors --retry-delay 3 "$DEPLOYMENT_URL/" >/dev/null
          curl --fail --silent --show-error --location --retry 5 --retry-all-errors --retry-delay 3 "$DEPLOYMENT_URL/app" >/dev/null
          curl --fail --silent --show-error --location --retry 5 --retry-all-errors --retry-delay 3 "$DEPLOYMENT_URL/api/health/db" >/dev/null
